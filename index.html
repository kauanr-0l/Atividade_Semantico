<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty API</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>Rick and Morty API</h1>

        <section>

            <input
                type="text"
                id="pesquisa"
                placeholder="Digite um personagem">

            <button id="buscar">
                Pesquisar
            </button>

        </section>

    </header>

    <main>

        <section>

            <h1 id="titulo-personagem">
                Rick Sanchez
            </h1>

        </section>

        <article>

            <figure>

                <img
                    id="imagem"
                    src="https://rickandmortyapi.com/api/character/avatar/1.jpeg"
                    alt="Imagem do personagem">

            </figure>

            <section>

                <p id="especie">
                    Espécie
                </p>

                <p id="status">
                    Status
                </p>

                <p id="genero">
                    Gênero
                </p>

                <nav>

                    <button id="voltar">
                        Voltar
                    </button>

                    <button id="avancar">
                        Avançar
                    </button>

                </nav>

            </section>

        </article>

    </main>

    <script src="script.js"></script>

</body>

</html>
